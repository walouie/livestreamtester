<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Twitch Player</title>
  <style>
    * { margin: 0; padding: 0; overflow: hidden; }
    html, body { width: 100%; height: 100%; background: #000; }
    #player { width: 100%; height: 100%; }
    #unmute-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 9999;
      padding: 15px 30px;
      font-size: 18px;
      background: #9147ff;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    #unmute-btn:hover { background: #7c2ff0; }
  </style>
</head>
<body>
  <div id="player"></div>
  <button id="unmute-btn" onclick="unmute()">🔊 Click to Unmute</button>
  <script src="https://player.twitch.tv/js/embed/v1.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const channel = params.get('channel') || 'lofigirl';

    const player = new Twitch.Player("player", {
      channel: channel,
      parent: [window.location.hostname],
      autoplay: true,
      muted: true,
      width: "100%",
      height: "100%"
    });

    function unmute() {
      player.setMuted(false);
      player.setVolume(1.0);
      document.getElementById('unmute-btn').style.display = 'none';
    }

    // Auto-hide button after 30 seconds
    setTimeout(() => {
      document.getElementById('unmute-btn').style.display = 'none';
    }, 30000);
  </script>
</body>
</html>
