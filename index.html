<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Twitch Player</title>
  <style>
    * { margin: 0; padding: 0; overflow: hidden; }
    html, body { width: 100%; height: 100%; background: #000; }
    iframe { width: 100%; height: 100%; border: none; }
  </style>
</head>
<body>
  <iframe id="player" allowfullscreen></iframe>
  <script>
    const params = new URLSearchParams(window.location.search);
    const channel = params.get('channel') || 'lofigirl';
    const parent = window.location.hostname;
    const iframe = document.getElementById('player');
    iframe.src = `https://player.twitch.tv/?channel=${channel}&parent=${parent}&autoplay=true&muted=true`;
    
    // Attempt to unmute after a delay
    setTimeout(() => {
      iframe.contentWindow.postMessage({ type: 'unmute' }, '*');
    }, 5000);
  </script>
</body>
</html>
