<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Twitch Player</title>
  <style>
    * { margin: 0; padding: 0; overflow: hidden; }
    html, body { width: 100%; height: 100%; background: #000; }
    #player { width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div id="player"></div>
  <script src="https://player.twitch.tv/js/embed/v1.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const channel = params.get('channel') || 'lofigirl';

    const player = new Twitch.Player("player", {
      channel: channel,
      parent: [window.location.hostname],
      autoplay: true,
      muted: false,
      width: "100%",
      height: "100%"
    });

    // Repeatedly try to unmute every 2 seconds for the first 30 seconds
    let attempts = 0;
    const unmuteInterval = setInterval(() => {
      player.setMuted(false);
      player.setVolume(1.0);
      attempts++;
      if (attempts >= 15) {
        clearInterval(unmuteInterval);
      }
    }, 2000);

    player.addEventListener(Twitch.Player.PLAYING, () => {
      player.setMuted(false);
      player.setVolume(1.0);
    });
  </script>
</body>
</html>
